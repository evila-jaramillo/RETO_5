<main class="contacto">
  <h2>Contacto</h2>
  <p>Si quieres contactarnos, completa el formulario o sigue nuestras redes sociales:</p>

  <form>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" placeholder="Tu nombre">
    <br>
    <label for="email">Correo:</label>
    <input type="email" id="email" placeholder="Tu correo">
    <br>
    <label for="mensaje">Mensaje:</label>
    <textarea id="mensaje" placeholder="Escribe tu mensaje"></textarea>
    <br>
    <button type="submit" disabled>Enviar (pendiente)</button>
  </form>

  <div class="redes">
    <a href="#">📘 Facebook</a>
    <a href="#">📷 Instagram</a>
    <a href="#">🐦 Twitter</a>
    <a href="#">🎵 TikTok</a>
  </div>
</main>
